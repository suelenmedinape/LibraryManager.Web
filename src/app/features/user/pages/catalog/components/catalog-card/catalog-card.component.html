<article class="c-card c-card--interactive">
  <div class="c-card__cover">
    <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"
      xmlns="http://www.w3.org/2000/svg">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253">
      </path>
    </svg>
  </div>

  @if (book().genres.length) {
    <span class="c-badge c-badge--info" style="align-self: flex-start; margin-bottom: 0.5rem;">
      {{ book().genres[0].name }}
    </span>
  }

  <h3 class="c-card__title">{{ book().title }}</h3>
  <p class="c-card__subtitle">{{ book().author }}</p>

  <div class="c-card__details">
    <span><strong>Editora:</strong> {{ book().publisher }}</span>
    <span><strong>Ano:</strong> {{ book().year }}</span>
  </div>

  <div class="c-card__meta">
    <span class="c-badge c-badge--success">Disponível</span>
    <button class="c-btn c-btn--outline c-btn--sm" (click)="viewDetail.emit(book())">
      Ver Detalhes
    </button>
  </div>
</article>
