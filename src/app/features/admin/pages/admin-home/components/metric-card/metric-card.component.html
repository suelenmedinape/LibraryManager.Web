<section class="l-grid l-grid--dashboard u-mb-2">

  <div class="c-card c-card--interactive">
    <div class="c-card__stat">
      <div class="c-stat">
        <span class="c-stat__label">Total de Livros</span>
        <span class="c-stat__number">{{ data()?.totalBooks ?? 0 }}</span>
      </div>
      <div class="c-card__icon-box">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
        </svg>
      </div>
    </div>
  </div>

  <div class="c-card c-card--interactive">
    <div class="c-card__stat">
      <div class="c-stat">
        <span class="c-stat__label">Empréstimos Ativos</span>
        <span class="c-stat__number">{{ data()?.activeLoans ?? 0 }}</span>
      </div>
      <div class="c-card__icon-box">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/>
        </svg>
      </div>
    </div>
  </div>

  <div class="c-card c-card--interactive" style="border-left: 4px solid var(--primary-color);">
    <div class="c-card__stat">
      <div class="c-stat">
        <span class="c-stat__label">Devoluções Pendentes</span>
        <span class="c-stat__number" style="color: var(--primary-color);">{{ data()?.pendingReturns ?? 0 }}</span>
      </div>
      <div class="c-card__icon-box" style="background-color: var(--primary-light); color: var(--primary-color);">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
      </div>
    </div>
  </div>

  <div class="c-card c-card--interactive">
    <div class="c-card__stat">
      <div class="c-stat">
        <span class="c-stat__label">Usuários Cadastrados</span>
        <span class="c-stat__number">{{ data()?.registeredUsers ?? 0 }}</span>
      </div>
      <div class="c-card__icon-box">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
      </div>
    </div>
  </div>

</section>
