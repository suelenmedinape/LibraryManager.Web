<div class="c-modal c-modal--open">
  <div class="c-modal__dialog c-modal__dialog--large">
    <button type="button" class="c-modal__close" (click)="close.emit()">&times;</button>
    <h2 class="c-modal__title">{{ title() }}</h2>
    <div class="c-modal__body">
      <form class="c-form" (ngSubmit)="onSubmit()">
        <div class="l-grid" style="grid-template-columns: repeat(2, 1fr); gap: 1rem; margin: 0;">
          <div class="c-form__group">
            <label class="c-form__label">Título</label>
            <input type="text" class="c-form__input" placeholder="Título do livro"
              [value]="formTitle()" (input)="formTitle.set($any($event.target).value)" required />
          </div>
          <div class="c-form__group">
            <label class="c-form__label">Autor</label>
            <input type="text" class="c-form__input" placeholder="Nome do autor"
              [value]="formAuthor()" (input)="formAuthor.set($any($event.target).value)" required />
          </div>
          <div class="c-form__group">
            <label class="c-form__label">Editora</label>
            <input type="text" class="c-form__input" placeholder="Nome da editora"
              [value]="formPublisher()" (input)="formPublisher.set($any($event.target).value)" required />
          </div>
          <div class="c-form__group">
            <label class="c-form__label">ISBN</label>
            <input type="text" class="c-form__input" placeholder="Ex: 978-3-16-148410-0"
              [value]="formIsbn()" (input)="formIsbn.set($any($event.target).value)" required />
          </div>
          <div class="c-form__group">
            <label class="c-form__label">Ano</label>
            <input type="number" class="c-form__input"
              [value]="formYear()" (input)="formYear.set($any($event.target).valueAsNumber)" required />
          </div>
          <div class="c-form__group">
            <label class="c-form__label">Edição</label>
            <input type="number" class="c-form__input"
              [value]="formEdition()" (input)="formEdition.set($any($event.target).valueAsNumber)" required />
          </div>
        </div>
        <div class="c-form__group" style="margin-top: 1rem;">
          <label class="c-form__label">Gêneros</label>
          <div style="display: flex; flex-wrap: wrap; gap: 0.75rem; max-height: 120px; overflow-y: auto; padding: 0.5rem; border: 1px solid var(--border-color); border-radius: 0.5rem;">
            @for (genre of genres(); track genre.id) {
              <label style="display: flex; align-items: center; gap: 0.35rem; cursor: pointer; font-size: 0.9rem; color: var(--text-primary);">
                <input type="checkbox" [checked]="isGenreSelected(genre.id)" (change)="toggleGenreSelection(genre.id)" />
                {{ genre.name }}
              </label>
            }
          </div>
        </div>
        <div class="c-form__actions">
          <button type="button" class="c-btn c-btn--secondary" (click)="close.emit()">Cancelar</button>
          <button type="submit" class="c-btn c-btn--primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>
</div>
<div class="c-modal__backdrop" (click)="close.emit()"></div>
