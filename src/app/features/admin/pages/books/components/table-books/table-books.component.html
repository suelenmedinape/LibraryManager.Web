<div class="c-table-responsive">
  <table class="c-table">
    <thead class="c-table__head">
      <tr>
        <th style="width: 70px;">Capa</th>
        <th>Título</th>
        <th>Autor</th>
        <th>Gênero</th>
        <th>ISBN</th>
        <th>Edição</th>
        <th class="u-text-center" style="width: 220px;">Ações</th>
      </tr>
    </thead>
    @if (isLoading()) {
    <tbody>
      <tr>
        <td colspan="7" style="position: relative; height: 200px;">
          <app-loading [relative]="true" />
        </td>
      </tr>
    </tbody>
    } @else {
    <tbody>
      @for (item of data(); track item.id) {
      <tr class="c-table__row">
        <td class="c-table__cell">
          <svg style="width: 1.5rem; height: 1.5rem; color: var(--text-muted);" fill="none" stroke="currentColor"
            stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253">
            </path>
          </svg>
        </td>
        <td class="c-table__cell u-font-bold">{{ item.title }}</td>
        <td class="c-table__cell">{{ item.author }}</td>
        <td class="c-table__cell">
          @for (genre of item.genres; track genre.id) {
            <span class="c-badge c-badge--muted">{{ genre.name }}</span>
          }
        </td>
        <td class="c-table__cell">{{ item.isbn }}</td>
        <td class="c-table__cell">{{ item.edition }}</td>
        <td class="c-table__cell c-table__cell--actions u-text-center">
          <button type="button" class="c-btn c-btn--secondary c-btn--sm" (click)="edit.emit(item)">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg" style="width: 0.9rem; height: 0.9rem;">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z">
              </path>
            </svg>
            Editar
          </button>
          <button type="button" class="c-btn c-btn--danger c-btn--sm" (click)="delete.emit(item)">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg" style="width: 0.9rem; height: 0.9rem;">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16">
              </path>
            </svg>
            Excluir
          </button>
        </td>
      </tr>
      } @empty {
      <tr class="c-table__row">
        <td class="c-table__cell u-text-center" colspan="7">Nenhum livro encontrado</td>
      </tr>
      }
    </tbody>
    }
  </table>
</div>
